[package]
name = "talon-pilot-studio"
version = "0.1.0"
description = "Talon Pilot 桌面客户端"
edition = "2021"
rust-version = "1.77"

[lib]
name = "talon_pilot_studio_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
which = "6"

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = true
