# 发版依赖仓的 ref 锁定 —— release.yml 按这里的 ref checkout talon-pilot / talon-ui。
#
# 为什么:tauri.conf.json 的 frontendDist 跨仓引用 talon-pilot/web-next 的构建产物,
# 不锁 ref 的话同一个 tag 在不同时间重跑会打出不同前端(不可复现、无法回滚)。
#
# 用法:
#   - 日常可以填分支名(跟最新),发正式版前应锁成具体 commit SHA;
#   - workflow_dispatch 手动跑时可用 inputs 临时覆盖,不用改文件。
# 0.1.11 发版锁定(2026-06-23):锁成具体 commit SHA,保证同 tag 重跑打出一致前端。
# 两个 SHA 都必须在 darkmice 上(studio CI 从 darkmice checkout,不是 x.xgit 镜像)。
# talon_pilot = a69e2a1e:在 bcfc05cb(0.1.10)基础上追上 06-19~06-23 全部 web 特性 ——
#   普通群聊(@员工转普通群)+ 公共 MentionTextEditor + 附件 lightbox + 重连流式 partial +
#   邮箱+密码登录(第三方式)+ 验证码/OAuth 改密免旧密码 + 设置弹窗 + 模式选择器(设计含
#   logo / 办公接管)+ TalonBlock 前端组件层。
# talon_ui = 702b16cf:Portal 显式挂 body 修 transform 祖先下弹窗不居中(0.1.10 后的 modal 修复)。
talon_pilot_ref = "a69e2a1e8e1ce83aea2f4d6193c162a31a65ed70"
talon_ui_ref = "702b16cfdd869625a228a6cdd424b909697e0e5f"
