# 发版依赖仓的 ref 锁定 —— release.yml 按这里的 ref checkout talon-pilot / talon-ui。
#
# 为什么:tauri.conf.json 的 frontendDist 跨仓引用 talon-pilot/web-next 的构建产物,
# 不锁 ref 的话同一个 tag 在不同时间重跑会打出不同前端(不可复现、无法回滚)。
#
# 用法:
#   - 日常可以填分支名(跟最新),发正式版前应锁成具体 commit SHA;
#   - workflow_dispatch 手动跑时可用 inputs 临时覆盖,不用改文件。
# 0.1.9 发版锁定(2026-06-17):锁成具体 commit SHA,保证同 tag 重跑打出一致前端。
# 两个 SHA 都必须在 darkmice 上(studio CI 从 darkmice checkout,不是 x.xgit 镜像)。
# talon_pilot = dd758a19:执行节点可升级红点 + 运营后台 tp-agent 版本设定面板 + 之前累积改动。
talon_pilot_ref = "dd758a196f2f5b1cdecd91d83598de0a91014e92"
talon_ui_ref = "13cfd1f95fcf4649139c0a5d67ac840f88e34d0e"
